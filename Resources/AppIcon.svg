<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="purpleGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B61FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <linearGradient id="blueGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <linearGradient id="textGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Scale and center the whole composition -->
  <g transform="translate(256,256) scale(1.35) translate(-260,-220)">
    <!-- Purple bubble -->
    <g filter="url(#shadow)">
      <path d="
        M80 100
        Q80 60 120 60
        H280
        Q320 60 320 100
        V200
        Q320 240 280 240
        H180
        L140 280
        V240
        H120
        Q80 240 80 200
        Z"
        fill="url(#purpleGradient)"
        opacity="0.9"
      />
    </g>

    <!-- Blue bubble -->
    <g filter="url(#shadow)">
      <path d="
        M220 200
        Q220 160 260 160
        H400
        Q440 160 440 200
        V300
        Q440 340 400 340
        H360
        V380
        L320 340
        H260
        Q220 340 220 300
        Z"
        fill="url(#blueGradient)"
        opacity="0.9"
      />
    </g>

    <!-- Letter A -->
    <text x="200" y="175"
          text-anchor="middle"
          font-size="90"
          font-family="-apple-system, SF Pro, sans-serif"
          font-weight="600"
          fill="url(#textGradient)">
      A
    </text>

    <!-- Chinese character -->
    <text x="330" y="290"
          text-anchor="middle"
          font-size="90"
          font-family="-apple-system, SF Pro, sans-serif"
          font-weight="600"
          fill="url(#textGradient)">
      文
    </text>
  </g>
</svg>